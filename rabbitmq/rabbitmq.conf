## ─── Cluster formation ────────────────────────────────────────────────────────
## Static peer discovery: each node knows the full list at startup.
## No scripts or manual join_cluster calls needed — RabbitMQ self-assembles.

cluster_formation.peer_discovery_backend     = rabbit_peer_discovery_classic_config
cluster_formation.classic_config.nodes.1     = rabbit@rabbitmq1
cluster_formation.classic_config.nodes.2     = rabbit@rabbitmq2
cluster_formation.classic_config.nodes.3     = rabbit@rabbitmq3

## ─── Default queue type ───────────────────────────────────────────────────────
## Queues declared without x-queue-type default to Classic
default_queue_type = classic

## ─── Logging ──────────────────────────────────────────────────────────────────
log.console       = true
log.console.level = info

## ─── Stream protocol (port 5552) ──────────────────────────────────────────────
## The rabbitmq_stream plugin exposes this port once enabled_plugins contains it.
## Default is 5552; no override needed unless you want a different port.

## ─── Management API (port 15672) ──────────────────────────────────────────────
## Default port is 15672 — no override needed unless you want a different port.
